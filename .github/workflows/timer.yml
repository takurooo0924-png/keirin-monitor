name: Keirin Scraper

on:
  schedule:
    - cron: '*/30 * * * *' # 30分おきに自動実行
  workflow_dispatch:      # 手動実行ボタン用

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 pytz
          playwright install chromium

      - name: Run scraper
        run: python -u scraper.py

      - name: Save Screenshot (Debug)
        if: always() # エラーが起きても画像を保存する
        uses: actions/upload-artifact@v4
        with:
          name: kdreams-view
          path: debug_kdreams.png

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git commit -m "Update schedule" || echo "No changes to commit"
          git push
